# Omegon Compatibility Manifest

This file is a placeholder for Auspex's explicit runtime compatibility contract with released Omegon versions.

## Current declared shape

```toml
[omegon]
minimum_version = "0.15.20"
maximum_tested_version = "0.15.25"
control_plane_schema = 2
```

## Purpose

Auspex should not attach blindly to arbitrary Omegon instances. It should declare which Omegon release line and control-plane schema it supports, then verify that at runtime.

## Status

Documentation placeholder only. Actual manifest format can change once the app's compatibility handling settles further.
