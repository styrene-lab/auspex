name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Rust app and site scaffold
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check out Omegon sibling for path dependency
        uses: actions/checkout@v4
        with:
          repository: styrene-lab/omegon
          path: omegon

      - name: Check out styrene-rs sibling for path dependency
        uses: actions/checkout@v4
        with:
          repository: styrene-lab/styrene-rs
          ref: feat/conversations-pages
          path: styrene-rs

      - name: Check out styrene-rs policy worktree for path dependency
        uses: actions/checkout@v4
        with:
          repository: styrene-lab/styrene-rs
          ref: feature/styrene-policy-crate
          path: worktrees/styrene-rs-policy

      - name: Link path dependencies at expected sibling paths
        run: |
          mkdir -p "$GITHUB_WORKSPACE/../worktrees"
          ln -sfn "$GITHUB_WORKSPACE/omegon" "$GITHUB_WORKSPACE/../omegon"
          ln -sfn "$GITHUB_WORKSPACE/styrene-rs" "$GITHUB_WORKSPACE/../styrene-rs"
          ln -sfn "$GITHUB_WORKSPACE/worktrees/styrene-rs-policy" "$GITHUB_WORKSPACE/../worktrees/styrene-rs-policy"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build Astro site
        working-directory: site
        run: npm run build

  lipstyk:
    name: lipstyk
    uses: styrene-lab/lipstyk/.github/workflows/lipstyk.yml@main
    with:
      paths: "src/ auspex-core/src/ auspex-operator/src/"
      threshold: 500
