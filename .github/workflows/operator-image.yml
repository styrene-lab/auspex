name: Build Operator + Web UI Image

on:
  push:
    branches: [main]
    paths:
      - "auspex-operator/**"
      - "auspex-core/**"
      - "src/**"
      - "web/**"
      - "assets/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile.operator"
      - ".github/workflows/operator-image.yml"
      - "profiles/auspex-operator.toml"
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/auspex-operator

jobs:
  build:
    name: Build operator + web UI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Check out Omegon sibling for path dependency
        uses: actions/checkout@v4
        with:
          repository: styrene-lab/omegon
          path: omegon

      - name: Check out styrene-rs sibling for path dependency
        uses: actions/checkout@v4
        with:
          repository: styrene-lab/styrene-rs
          ref: feat/conversations-pages
          path: styrene-rs

      - name: Link Omegon at expected sibling path
        run: |
          ln -sfn "$GITHUB_WORKSPACE/omegon" "$GITHUB_WORKSPACE/../omegon"
          ln -sfn "$GITHUB_WORKSPACE/styrene-rs" "$GITHUB_WORKSPACE/../styrene-rs"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        run: cargo install trunk

      # --- Build the WASM web UI ---

      - name: Build web UI
        run: |
          cd web
          trunk build --release --features web --no-default-features

      # --- Build the operator binary ---

      - name: Build operator (Linux)
        run: |
          cargo build --release -p auspex-operator
          cp target/release/auspex-operator dist/auspex-operator

      # --- Assemble the OCI image ---

      - name: Resolve image tag
        id: meta
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${TAG_INPUT}" ]; then
            tag="${TAG_INPUT}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="latest"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Prepare Docker build context
        id: context
        run: |
          set -euo pipefail
          context="${RUNNER_TEMP}/auspex-operator-image"
          rm -rf "$context"
          mkdir -p "$context"
          cp -a . "$context/auspex"
          cp -a omegon "$context/omegon"
          cp -a styrene-rs "$context/styrene-rs"
          echo "path=${context}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.context.outputs.path }}
          file: ${{ steps.context.outputs.path }}/auspex/Dockerfile.operator
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

      # --- SBOM + signing ---

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install supply chain tools
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        id: sbom
        run: |
          image="${{ steps.meta.outputs.image }}@${{ steps.push.outputs.digest }}"
          syft "$image" --output cyclonedx-json=auspex-operator.cdx.json
          count=$(jq '.components | length' auspex-operator.cdx.json)
          echo "component_count=${count}" >> "$GITHUB_OUTPUT"

      - name: Vulnerability scan
        id: vuln
        continue-on-error: true
        run: |
          grype sbom:auspex-operator.cdx.json --output json --file auspex-operator-vulns.json
          echo "vulnerability_count=$(jq '.matches | length' auspex-operator-vulns.json)" >> "$GITHUB_OUTPUT"

      - name: Sign and attach SBOM
        run: |
          image="${{ steps.meta.outputs.image }}@${{ steps.push.outputs.digest }}"
          cosign sign-blob --yes \
            --bundle auspex-operator.cdx.json.bundle \
            auspex-operator.cdx.json
          cosign attach sbom --sbom auspex-operator.cdx.json --type cyclonedx "$image"

      - name: Build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operator-sbom
          path: |
            auspex-operator.cdx.json
            auspex-operator-vulns.json
            auspex-operator.cdx.json.bundle
