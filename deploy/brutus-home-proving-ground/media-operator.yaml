apiVersion: styrene.sh/v1alpha1
kind: OmegonAgent
metadata:
  name: home-media-operator
  labels:
    app.kubernetes.io/part-of: auspex-home-proving-ground
    styrene.sh/agent-package: home-media-operator
    styrene.sh/agent-role: detached-service
    styrene.sh/home-stack: media
  annotations:
    auspex.styrene.sh/purpose: "Watch and operate the home media stack without owning unrelated cluster work."
    auspex.styrene.sh/package-agent: styrene.home-media-operator
    auspex.styrene.sh/package-profile: styrene-lab/omegon-home-media-operator
spec:
  agent: styrene.home-media-operator
  model: anthropic:claude-sonnet-4-6
  posture: fabricator
  role: detached-service
  mode: daemon
  image: ghcr.io/styrene-lab/omegon-agents:latest
  profile: styrene-lab/omegon-home-media-operator
  secrets:
    authJsonSecret: home-media-operator-provider-auth
  identity:
    provision: true
    securityTier: file
    meshRole: operator
    mtls: true
  controlPlane:
    tls:
      enabled: true
      profile: home-media
  resources:
    cpu: "500m"
    memory: "768Mi"
