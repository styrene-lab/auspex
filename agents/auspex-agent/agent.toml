[agent]
id = "styrene.auspex-agent"
name = "Auspex Primary Coordinator"
version = "0.1.0"
description = "Primary Omegon backing assistant for Auspex. Supervises local and fleet Omegon runtimes through Auspex policy gates."
domain = "auspex"

[persona]
directive = "PERSONA.md"
badge = "auspex"
mind_facts = "mind/facts.jsonl"

[settings]
model = "openai-codex:gpt-5.5"
thinking_level = "medium"
context_class = "squad"
max_turns = 50

[workflow]
name = "auspex-primary"

[workflow.phases.exploring]
model = "openai-codex:gpt-5.5"
max_turns = 20
thinking_level = "high"

[workflow.phases.implementing]
model = "openai-codex:gpt-5.5"
max_turns = 50
thinking_level = "medium"

[workflow.phases.verifying]
model = "openai-codex:gpt-5.5"
max_turns = 30
thinking_level = "medium"

[secrets]
required = []
optional = ["OPENAI_API_KEY", "ANTHROPIC_API_KEY", "GITHUB_TOKEN", "KUBECONFIG"]
