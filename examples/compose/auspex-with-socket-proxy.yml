# Auspex with Docker Socket Proxy
#
# This compose file runs Auspex with a constrained Docker API proxy instead of
# mounting /var/run/docker.sock directly into Auspex.
#
# Why: Docker socket access is effectively root-equivalent host access.  The
# proxy allowlists only the API families Auspex needs for OCI agent lifecycle:
# image pull, container create/start/stop/remove/list, and logs/health discovery.
#
# Usage:
#   docker compose -f examples/compose/auspex-with-socket-proxy.yml up -d
#
# Adjust the auspex image tag before production use.

services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      # Read/list surfaces Auspex needs for discovery and diagnostics.
      CONTAINERS: "1"
      IMAGES: "1"
      NETWORKS: "1"
      INFO: "1"
      EVENTS: "1"
      PING: "1"
      VERSION: "1"

      # Write access required for launch/terminate lifecycle.
      POST: "1"

      # Explicitly deny higher-risk surfaces Auspex does not need.
      AUTH: "0"
      BUILD: "0"
      COMMIT: "0"
      CONFIGS: "0"
      DISTRIBUTION: "0"
      EXEC: "0"
      GRPC: "0"
      NODES: "0"
      PLUGINS: "0"
      SECRETS: "0"
      SERVICES: "0"
      SESSION: "0"
      SWARM: "0"
      SYSTEM: "0"
      TASKS: "0"
      VOLUMES: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - auspex-control

  auspex:
    image: ghcr.io/styrene-labs/auspex:latest
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    environment:
      # BollardBackend::detect() honors DOCKER_HOST first.
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      RUST_LOG: info
    ports:
      - "8080:8080"
    networks:
      - auspex-control

networks:
  auspex-control:
    driver: bridge
